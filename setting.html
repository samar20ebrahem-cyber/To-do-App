<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/setting.css">
    <title>To Do List App Setting</title>
</head>
<body class="dark">
    <header>
        <h1 data-i18n="settings">Settings</h1>
        <span class="close">✕</span>
    </header>

    <main>
        <form>
            <label for="name" data-i18n="yourName">Your Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name"   data-i18n-placeholder="namePlaceholder">

            <!-- Dark Mode -->
            <div class="setting-group">
                <div class="dark-mode">
                    <div>
                        <h2 style="margin: 0;" data-i18n="darkMode">Dark Mode</h2>
                        <p style="margin: 4px 0 0; color: #666; font-size: 0.95rem;" data-i18n="darkModeDescription">Soft on the eyes at night</p>
                    </div>
                    <input type="checkbox" id="darkMode" style="width: 50px; height: 28px; accent-color: #c48b9f;">
                </div>
            </div>

            <!-- Theme -->
            <div class="setting-group">
                <h2 data-i18n="theme">Theme</h2>
                <div class="theme-op">
                    <div class="option active" data-theme="light" data-i18n="light">Light</div>
                    <div class="option" data-theme="dark" data-i18n="dark">Dark</div>
                    <div class="option" data-theme="girly" data-i18n="girly">Girly</div>
                </div>
            </div>

            <!-- Animation Speed -->
            <div class="setting-group animation">
                <h2 data-i18n="animationSpeed">Animation Speed</h2>
                <input type="range" min="0" max="100" value="50" id="animationSpeed">
            </div>

            <!-- Font Size -->
            <div class="setting-group animation">
                <h2 data-i18n="fontSize">Font Size</h2>
                <input type="range" min="12" max="24" value="16" id="fontSize">
            </div>

            <!-- Language -->
            <div class="setting-group">
                <h2 data-i18n="language">Language</h2>
                <div class="lang">
                    <div class="card active" data-lang="en">English</div>
                    <div class="card" data-lang="ar">العربية</div>
                </div>
            </div>

            <button type="submit" data-i18n="saveChanges">Save Changes</button>
        </form>
    </main>
</body>
     <script src="https://unpkg.com/i18next@25.3.2/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend@3.0.2/i18nextHttpBackend.min.js"></script>
     <script src="js/language.js"></script>
    <script src="js/setting.js"></script>
</html>
