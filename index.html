<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="My Todo App - أنجز مهامك بسهولة">
    <meta property="og:description" content="تطبيق إدارة المهام اليومية">
    <meta property="og:image" content="https://yoursite.com/todo-preview.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <title>To Do List App</title>
</head>
<body>
    <header>
        <div class="text-title">
             <p  id="today-date"><!-- التاريخ هنعمله بجافا اسكربت --></p>
            <h1 id="welcome"> samar👋 </h1>
        </div>
         <div class="icons-header">
            <i class="fa-solid fa-moon"></i> 
            <a href="/pages/notifications.html" ><i class="fa-regular fa-bell"></i> </a>
            <a href="/pages/setting.html"><i class="fa-solid fa-gear"></i></a> 
          <div class="user-avatar">S</div> 
         </div>
    </header> 
    <main>
        <!-- SEARCH BAR -->
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" placeholder="Search...">
        </div>
        <section>
            <div class="tasks-n">
                <!-- CARD 1 -->
                <div class="card-vs">
                    <i class="fa-solid fa-sun"></i>
                    <i class="fa-solid fa-arrow-up-right-from-square arrow"></i>
                    <h3>0</h3>  <!-- عدد التاسكات اللي من النوع دا  -->
                    <p>mmm</p> <!--// نوعه -->
                    <input type="range">
                    <p>mmm</p>  
                </div>
                <!--CARD 2-->
                <div class="card-vs">
                    <i class="fa-regular fa-circle-check"></i>
                    <i class="fa-solid fa-arrow-up-right-from-square arrow"></i> 
                    <h3>0</h3>  <!-- عدد التاسكات اللي من النوع دا  -->
                    <p>mmm</p> <!--// نوعه -->
                    <input type="range">
                    <p>mmm</p>  
                </div>
                <!-- CARD 3 -->
                <div class="card-vs">
                    <i class="fa-solid fa-list-check"></i>
                    <i class="fa-solid fa-arrow-up-right-from-square arrow"></i>
                    <h3>0</h3>  <!-- عدد التاسكات اللي من النوع دا  -->
                    <p>,,mmm</p> <!--// نوعه -->
                    <input type="range">
                    <p>mmm</p>  
                </div>
                <!-- CARD 4 -->
                <div class="card-vs">
                   <i class="fa-solid fa-triangle-exclamation"></i>
                    <i class="fa-solid fa-arrow-up-right-from-square arrow"></i> 
                     <h3>0</h3> <!-- عدد التاسكات اللي من النوع دا  -->
                    <p>mmm</p> <!--// نوعه -->
                    <input type="range">
                    <p>mmm</p>  
                </div>
            </div>
        </section>
        <section>
            <div class="tasks">
                 <h2>Your Tasks</h2>
                 <button><a href="/pages/new-task.html"> <i class="fa-solid fa-plus"></i> Add New Task </a></button>
            </div>
            <div class="filters">
                <button class="filter-btn active">All</button>
                <button class="filter-btn">Today</button>
                <button class="filter-btn">Tomorrow</button>
                <button class="filter-btn">This week</button>
                <button class="filter-btn">Pending</button>
                <button class="filter-btn">Completed</button>
                <button>  <i class="fa-solid fa-plus"></i> more filter</button>
            </div>    
        </section>
    </main>
</body>
<script src="/js/main.js"></script>
</html>
