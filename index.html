<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="My Todo App - أنجز مهامك بسهولة">
    <meta property="og:description" content="تطبيق إدارة المهام اليومية">
    <meta property="og:image" content="https://yoursite.com/todo-preview.jpg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
     <link rel="stylesheet" href="css/main.css">
     <link rel="stylesheet" href="css/theme.css">
    <title>To Do List App</title>
</head>
<body>
    <header>
        <div class="text-title">
             <p  id="today-date"><!-- التاريخ هنعمله بجافا اسكربت --></p>
            <h1 id="welcome"> </h1>
        </div>
         <div class="icons-header">
            <i class="fa-solid fa-moon"  id="mode"></i> 
            <div class="notification-icon">
               <a href="notifications.html"> <i class="fa-regular fa-bell"></i></a> <span id="notificationCount" class="notification-count">0</span></div>
            <a href="setting.html" target="_blank"><i class="fa-solid fa-gear"></i></a> 
          <div class="user-avatar" id="avatar">S</div> 
         </div>
    </header> 
    <main>
        <!-- SEARCH BAR -->
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" placeholder="Search..."  id="search" data-i18n-placeholder="search">
        </div>
        <section>
            <div class="tasks-n">
                <!-- CARD 1 -->
                <div class="card-vs">
                    <i class="fa-solid fa-sun"></i>
                    <i class="fa-solid fa-arrow-up-right-from-square arrow"></i>
                    <h3 id="totalTasks">0</h3>
                    <p data-i18n="todayTasks">Today's Tasks</p> 
                    <input type="range" id="todayRange" min="0" max="100" value="0">
                    <p id="finesh">0%</p> 
                </div>
                <!--CARD 2-->
                <div class="card-vs">
                    <i class="fa-regular fa-circle-check"></i>
                    <i class="fa-solid fa-arrow-up-right-from-square arrow"></i> 
                    <h3 id="completedTasks">0</h3>  
                    <p data-i18n="completed">Completed</p>
                    <input type="range" id="completedRange" min="0" max="100" value="0">
                    <p id="comp">0%</p>  
                </div>
                <!-- CARD 3 -->
                <div class="card-vs">
                    <i class="fa-solid fa-list-check"></i>
                    <i class="fa-solid fa-arrow-up-right-from-square arrow"></i>
                    <h3 id="allTasks">0</h3>  
                    <p data-i18n="allTasks">All Tasks</p> 
                    <input type="range" min="0" max="100" id="all" value="0">
                    <p id="all-taskat">0%</p>  
                </div>
                <!-- CARD 4 -->
                <div class="card-vs">
                   <i class="fa-solid fa-triangle-exclamation"></i>
                    <i class="fa-solid fa-arrow-up-right-from-square arrow"></i> 
                     <h3 id="overdueTasks">0</h3> <!-- عدد التاسكات اللي فات معدها -->
                    <p data-i18n="overdue">Overdue</p><!--// نوعه -->
                    <input type="range" id="overdueRange">
                    <p id="overduePercent">0%</p>  
                </div>
            </div>
        </section>
        <section>
            <div class="tasks">
                 <h2 data-i18n="yourTasks">Your Tasks</h2>
                  <button onclick="location.href='new-task.html'">
                      <i class="fa-solid fa-plus"></i>
                     <span data-i18n="newTask">New Task</span>
                </button>
            </div>
            <div class="filters">
                <button data-i18n="all" class="filter-btn active" id="allBtn">All</button>
                <button data-i18n="today" class="filter-btn" id="todayBtn">Today</button>
                <button data-i18n="completed" class="filter-btn" id="completedBtn">Completed</button>
                <button data-i18n="overdue" class="filter-btn" id="overdueBtn">Overdue</button>
            </div> 
           <div class="tasks-list"></div>
        </section>
    </main>
</body>
    <script src="https://unpkg.com/i18next@25.3.2/i18next.min.js"></script>
    <script src="https://unpkg.com/i18next-http-backend@3.0.2/i18nextHttpBackend.min.js"></script>
    <script src="js/language.js"></script>
    <script src="js/main.js"></script>
</html>
