<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/notifications.css">
    <title>To Do List App Notifications</title>
</head>
<body>
    <header>
        <div class="text-title">
            <p>Friday 10 May</p>
            <h1>Good morning, Samar 👋</h1>
        </div>
        <div class="icons-header">
            <i class="fa-solid fa-moon"></i> 
            <a href="notifications.html" target="_blank"><i class="fa-regular fa-bell"></i> </a>
            <a href="setting.html" target="_blank"><i class="fa-solid fa-gear"></i></a> 
          <div class="user-avatar">S</div> 
         </div>
    </header>
    <main>
        <!-- SEARCH BAR -->
        <div class="search-bar">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" placeholder="Search tasks or reminders...">
        </div>
            <!-- NOTIFICATIONS CARDS -->
        <div class="notifications-cards">
            <div class="card">
                <div class="noti">
                    <i class="fa-regular fa-bell"></i>
                    <div class="text">
                        <h2>Notifications</h2>
                        <p>Overdue and upcoming reminders</p>
                    </div>
                </div>
                <button>
                    <a href="new-task.html" target="_blank">
                    <i class="fa-solid fa-plus"></i>
                    New Task</a>
                </button>
            </div>
            <div class="card">
                <div class="noti">
                    <i class="fa-regular fa-bell"></i>
                    <div class="text">
                        <h2>Notifications</h2>
                        <p>Overdue and upcoming task reminders</p>
                    </div>
                </div>
            </div>
        </div>
        <!-- باقي الكود بجافا اسكربت -->
    </main>
</body>
</html>
