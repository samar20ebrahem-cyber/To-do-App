<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List App Notifications</title>
</head>
<body>
      <header>
        <p><!-- التاريخ هنعمله بجافا اسكربت --></p>
        <h1>Good <!-- (evening, morning)+name -->👋 </h1>
         <div class="icons-header">
            <i class="fa-solid fa-moon"></i> 
            <i class="fa-regular fa-bell"></i> 
            <i class="fa-solid fa-gear"></i>
            <div class="user-avatar">S</div> 
         </div>
    </header> 
    <main>
        <div class="serch-bar">
             <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search">
        </div>
        <div class="notifications-cards">
              <div class="card">
                <div class="noti">
                    <i class="fa-regular fa-bell"></i> 
                     <div class="text">
                        <h2>Notifications</h2>
                        <p>Overdue and upcoming reminders</p>
                     </div>
                </div>
                <button>
                    <i></i>
                    New Task
                </button>
              </div>
            <div class="card">
                <div class="noti">
                    <i class="fa-regular fa-bell"></i> 
                     <div class="text">
                        <h2>Notifications</h2>
                        <p>Overdue and upcoming task reminders</p>
                     </div>
                </div>

            </div>
        </div>
        <!-- باقي الكود بجافا اسكربت -->
    </main>
</body>
</html>
